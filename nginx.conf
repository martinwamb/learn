# Nginx server block for learn.wambugumartin.com
# Place this in /etc/nginx/sites-available/learn and symlink to sites-enabled/
# Then run: sudo certbot --nginx -d learn.wambugumartin.com

server {
    listen 80;
    server_name learn.wambugumartin.com;

    # Allow large audio file uploads (if ever needed)
    client_max_body_size 50M;

    # Serve pre-generated audio files directly (bypass Node.js)
    location /audio/ {
        alias /var/www/learn/public/audio/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # Serve pre-rendered Synfig animation videos directly (bypass Node.js)
    location /animations/ {
        alias /var/www/learn/public/animations/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # Proxy all other requests to Next.js
    location / {
        proxy_pass http://localhost:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
# After certbot runs it will add SSL config automatically above this block
